<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal - Modern 3D Journey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Hero / Landing Section -->
    <div id="hero" class="min-h-screen flex flex-col items-center justify-center relative p-6">
        <div class="text-center z-10 hero-content">
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 mb-6 drop-shadow-lg">Next-Gen Placement Portal</h1>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto mb-10 font-light tracking-wide">Enter the future of recruitment. A highly performant spatial interface mapping students to cutting-edge tech opportunities.</p>
            <div class="flex flex-col sm:flex-row gap-6 justify-center">
                <button onclick="scrollToAuth('loginForm')" class="glass-btn !w-48 text-lg">Student Login</button>
                <button onclick="scrollToAuth('registerForm')" class="glass-btn !w-48 !from-purple-600 !to-indigo-600 text-lg">Register Now</button>
            </div>
            <div class="mt-12 text-gray-400 animate-bounce">
                <p class="mb-2">Scroll Down</p>
                <svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </div>
        </div>
    </div>

    <!-- Auth Section -->
    <div id="auth-section" class="min-h-screen flex items-center justify-center p-6 relative">
        <div class="w-full max-w-md auth-panel absolute">
            <!-- Login Form -->
            <div class="bg-[#1a1d24] border border-[#2a2d36] rounded-2xl p-10 shadow-2xl auth-card block" id="loginForm">
                <div class="text-center mb-8">
                    <h3 class="text-2xl font-bold text-[#2096ed]">Access Portal</h3>
                    <p class="text-gray-400 text-sm mt-3">Sign in to track your applications</p>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-200 mb-2">Email Address</label>
                        <input type="email" id="logEmail" placeholder="student@example.com" class="w-full px-4 py-3 bg-[#e8eff5] border-none rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-200 mb-2">Password</label>
                        <input type="password" id="logPassword" placeholder="••••••••" class="w-full px-4 py-3 bg-[#e8eff5] border-none rounded-lg text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required>
                    </div>
                    <button onclick="login()" class="w-full bg-gradient-to-r from-[#0d85a8] to-[#2563eb] hover:opacity-90 text-white font-bold py-3 mt-4 rounded-lg shadow-lg transition-all focus:outline-none focus:ring-4 focus:ring-blue-500/30">Initialize Session</button>
                </div>
                
                <div class="mt-8 flex flex-col space-y-6 text-center">
                    <button onclick="toggleView('registerForm')" class="text-[#0ed3d3] hover:text-[#0bbfbf] font-bold transition-colors">New student? Initialize Profile</button>
                    <div class="h-px bg-white/5 w-full"></div>
                    <button onclick="window.location.href='admin-dashboard.html'" class="text-gray-500 hover:text-white font-medium transition-colors text-sm">TPO / Admin Override &rarr;</button>
                </div>
            </div>

            <!-- Register Form -->
            <div class="bg-[#1a1d24] border border-[#2a2d36] rounded-2xl p-10 shadow-2xl auth-card hidden" id="registerForm">
                <div class="text-center mb-8">
                    <h3 class="text-2xl font-bold text-[#0ed3d3]">Create Profile</h3>
                    <p class="text-gray-400 text-sm mt-3">Register to establish your system identity</p>
                </div>
                <div class="space-y-4">
                    <div class="flex gap-4">
                        <div class="w-1/2">
                            <label class="block text-sm font-bold text-gray-200 mb-1">Roll Number</label>
                            <input type="text" id="regRollNo" placeholder="e.g. 101" class="w-full px-4 py-2.5 bg-[#e8eff5] border-none rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required>
                        </div>
                        <div class="w-1/2">
                            <label class="block text-sm font-bold text-gray-200 mb-1">Department</label>
                            <input type="text" id="regDept" placeholder="e.g. CS, IT" class="w-full px-4 py-2.5 bg-[#e8eff5] border-none rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-200 mb-1">Full Name</label>
                        <input type="text" id="regName" placeholder="John Doe" class="w-full px-4 py-2.5 bg-[#e8eff5] border-none rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-200 mb-1">Email Address</label>
                        <input type="email" id="regEmail" placeholder="student@example.com" class="w-full px-4 py-2.5 bg-[#e8eff5] border-none rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-1/2">
                            <label class="block text-sm font-bold text-gray-200 mb-1">Password</label>
                            <input type="password" id="regPassword" placeholder="••••••••" class="w-full px-4 py-2.5 bg-[#e8eff5] border-none rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" required>
                        </div>
                        <div class="w-1/2">
                            <label class="block text-sm font-bold text-gray-200 mb-1">CGPA</label>
                            <input type="number" id="regCgpa" placeholder="Out of 10" step="0.01" min="0" max="10" class="w-full px-4 py-2.5 bg-[#e8eff5] border-none rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                        </div>
                    </div>
                    
                    <button onclick="register()" class="w-full bg-gradient-to-r from-[#0d85a8] to-[#2563eb] hover:opacity-90 text-white font-bold py-3 mt-6 rounded-lg shadow-lg transition-all focus:outline-none focus:ring-4 focus:ring-blue-500/30">Transmit Profile</button>
                </div>
                
                <div class="mt-6 flex flex-col space-y-6 text-center">
                    <button onclick="toggleView('loginForm')" class="text-[#0ed3d3] hover:text-[#0bbfbf] font-bold transition-colors">&larr; Return to Login</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initThreeBackground } from './three-bg.js';
        import gsap from 'gsap';

        // Initialize 3D 
        initThreeBackground();

        // GSAP Animations
        gsap.from('.hero-content', { opacity: 0, y: 50, duration: 1.5, ease: 'power3.out', delay: 0.5 });
        gsap.from('.auth-panel', { 
            opacity: 0, 
            scale: 0.9, 
            duration: 1, 
            scrollTrigger: {
                trigger: '#auth-section',
                start: 'top 75%'
            }
        });

        // Make functions globally available for inline onclick
        window.scrollToAuth = (targetForm) => {
            toggleView(targetForm);
            document.getElementById('auth-section').scrollIntoView({ behavior: 'smooth' });
        };
        
        window.toggleView = (view) => {
            const login = document.getElementById('loginForm');
            const register = document.getElementById('registerForm');
            
            if(view === 'loginForm') {
                register.classList.add('hidden');
                register.classList.remove('block');
                login.classList.remove('hidden');
                login.classList.add('block');
                gsap.from('#loginForm', { opacity: 0, x: -30, duration: 0.5 });
            } else {
                login.classList.add('hidden');
                login.classList.remove('block');
                register.classList.remove('hidden');
                register.classList.add('block');
                gsap.from('#registerForm', { opacity: 0, x: 30, duration: 0.5 });
            }
        };

        const API_URL = 'http://localhost:5000/api';

        window.login = async function() {
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPassword').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('rollNo', data.rollNo);
                    localStorage.setItem('name', data.name);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Authencation Access Denied');
                }
            } catch(e) {
                alert('Connection to core server failed. Ensure backend is operational.');
            }
        }

        window.register = async function() {
            const rollNo = String(document.getElementById('regRollNo').value);
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const department = document.getElementById('regDept').value;
            const cgpa = parseFloat(document.getElementById('regCgpa').value);

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({rollNo, name, email, password, department, cgpa})
                });
                
                if(res.ok) {
                    alert('Profile Established. Proceed to Login.');
                    toggleView('loginForm');
                } else {
                    const data = await res.json();
                    alert(data.error || 'Registration sequence error');
                }
            } catch(e) {
                alert('Connection to core server failed.');
            }
        }
    </script>
</body>
</html>
