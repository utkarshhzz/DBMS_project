<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Tracker - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-xl shadow-xl overflow-hidden border border-gray-200">
        <div class="px-8 py-6 bg-gradient-to-r from-blue-600 to-indigo-700">
            <h2 class="text-2xl font-bold text-white text-center m-0">Placement Portal</h2>
            <p class="text-blue-200 text-center text-sm mt-1">Unlock your future career</p>
        </div>
        
        <div class="p-8" id="loginForm">
            <h3 class="text-xl font-semibold text-gray-800 mb-6 text-center">Student Login</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="logEmail" placeholder="student@example.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="logPassword" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" required>
                </div>
                <button onclick="login()" class="w-full font-bold bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-3 mt-2 shadow-md transition-colors focus:ring-4 focus:ring-blue-300">Log In to Portal</button>
            </div>
            
            <div class="mt-6 flex flex-col space-y-3 text-center">
                <button onclick="toggleView('registerForm')" class="text-blue-600 hover:text-blue-800 font-medium transition-colors">New student? Create an account</button>
                <div class="h-px bg-gray-200 w-full my-2"></div>
                <button onclick="window.location.href='admin-dashboard.html'" class="text-gray-500 hover:text-gray-800 font-medium transition-colors text-sm">TPO / Admin Access &rarr;</button>
            </div>
        </div>

        <div class="p-8 hidden" id="registerForm">
            <h3 class="text-xl font-semibold text-gray-800 mb-6 text-center">Create Account</h3>
            <div class="space-y-4">
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Roll Number</label>
                        <input type="text" id="regRollNo" placeholder="e.g. 101" class="w-full px-4 py-2 bg-gray-50 text-sm rounded-lg border border-gray-300 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 outline-none transition-all" required>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                        <input type="text" id="regDept" placeholder="e.g. CS, IT" class="w-full px-4 py-2 bg-gray-50 text-sm rounded-lg border border-gray-300 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 outline-none transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe" class="w-full px-4 py-2 bg-gray-50 text-sm rounded-lg border border-gray-300 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 outline-none transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="regEmail" placeholder="student@example.com" class="w-full px-4 py-2 bg-gray-50 text-sm rounded-lg border border-gray-300 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 outline-none transition-all" required>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="regPassword" placeholder="••••••••" class="w-full px-4 py-2 bg-gray-50 text-sm rounded-lg border border-gray-300 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 outline-none transition-all" required>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">CGPA</label>
                        <input type="number" id="regCgpa" placeholder="Out of 10" step="0.01" min="0" max="10" class="w-full px-4 py-2 bg-gray-50 text-sm rounded-lg border border-gray-300 focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-200 outline-none transition-all">
                    </div>
                </div>
                
                <button onclick="register()" class="w-full font-bold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-3 mt-4 shadow-md transition-colors focus:ring-4 focus:ring-indigo-300">Complete Registration</button>
            </div>
            
            <div class="mt-6 text-center">
                <button onclick="toggleView('loginForm')" class="text-blue-600 hover:text-blue-800 font-medium transition-colors whitespace-nowrap">&larr; Back to Login</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        function toggleView(view) {
            document.getElementById('loginForm').classList.toggle('hidden', view !== 'loginForm');
            document.getElementById('registerForm').classList.toggle('hidden', view !== 'registerForm');
        }

        async function login() {
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPassword').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('rollNo', data.rollNo);
                    localStorage.setItem('name', data.name);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch(e) {
                alert('Server connection error. Is backend running?');
            }
        }

        async function register() {
            const rollNo = String(document.getElementById('regRollNo').value);
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const department = document.getElementById('regDept').value;
            const cgpa = parseFloat(document.getElementById('regCgpa').value);

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({rollNo, name, email, password, department, cgpa})
                });
                
                if(res.ok) {
                    alert('Registered! Please login.');
                    toggleView('loginForm');
                } else {
                    const data = await res.json();
                    alert(data.error || 'Registration failed');
                }
            } catch(e) {
                alert('Error connecting to backend.');
            }
        }
    </script>
</body>
</html>
